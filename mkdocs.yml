site_name: "Préconisations 4D"
site_description: "Guide de préconisations 4D"
site_url: "https://4edimension.github.io/Recommendations/"
repo_url: "https://github.com/4eDimension/Recommendations"
repo_name: "4eDimension/Recommendations"
docs_dir: docs
theme:
  name: material
  language: fr
  custom_dir: docs/overrides
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Basculer en mode clair
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      accent: light blue
      toggle:
        icon: material/weather-night
        name: Basculer en mode sombre
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      accent: light blue
      toggle:
        icon: material/weather-sunny
        name: Basculer en mode clair
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.tracking
    - navigation.top
    - toc.follow
    - content.code.copy
    - search.suggest
    - search.highlight
    - search.share
plugins:
  - search:
      lang: fr
      separator: '[\\s\\-]+'
  - git-revision-date-localized:
      locale: fr
      type: date
      fallback_to_build_date: true
markdown_extensions:
  - toc:
      permalink: true
      toc_depth: 3
  - attr_list
  - admonition
  - tables
  - meta
extra_css:
  - assets/stylesheets/translate-switch.css
extra:
  generator: false
nav:
  - "Introduction": index.md
  - "Démarrage":
    - "Recommandations générales": chapitres/02-recommandations-generales.md
    - "Numéros de port": chapitres/03-numeros-de-port.md
  - "Infrastructure":
    - "Processeur": chapitres/04-processeur.md
    - "Système d'exploitation": chapitres/05-systeme-dexploitation.md
    - "Mémoire": chapitres/06-memoire.md
    - "Disque dur": chapitres/07-disque-dur.md
    - "Sauvegarde / Opérations de maintenance": chapitres/08-sauvegarde-operations-de-maintenance.md
    - "Réseau": chapitres/09-reseau.md
    - "Web": chapitres/10-web.md
    - "Machine physique ou virtuelle": chapitres/11-machine-physique-ou-virtuelle.md
    - "Marque / Modèle de machine": chapitres/12-marque-modele-de-machine.md
    - "Tests / Recette / Déploiement": chapitres/13-tests-recette-deploiement.md
  - "Configuration base":
    - "Propriétés de la base": chapitres/14-proprietes-de-la-base.md
    - "Général": chapitres/15-general.md
    - "Compilateur": chapitres/16-compilateur.md
    - "Base de données / Stockage des données": chapitres/17-base-de-donnees-stockage-des-donnees.md
    - "Base de données / Mémoire": chapitres/18-base-de-donnees-memoire.md
  - "Exploitation et réseau":
