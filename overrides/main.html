{% extends "base.html" %}

{% block extrahead %}
  {{ super() }}
  <link rel="canonical" href="{{ page.canonical_url }}">
  <meta name="description" content="{{ config.site_description }}">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="{{ config.site_name }}">
  <meta property="og:title" content="{{ page.title if page.title else config.site_name }}">
  <meta property="og:description" content="{{ config.site_description }}">
  <meta property="og:url" content="{{ page.canonical_url }}">
  <meta property="og:image" content="{{ config.site_url }}assets/media/image1.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{ page.title if page.title else config.site_name }}">
  <meta name="twitter:description" content="{{ config.site_description }}">
  <meta name="twitter:image" content="{{ config.site_url }}assets/media/image1.png">
  <style>
    .md-source-file {
      display: none !important;
    }
  </style>
{% endblock %}

{% block announce %}
  {% if page and page.meta and page.meta.git_revision_date_localized %}
    <div class="md-banner">
      <div class="md-banner__inner md-grid">
        Dernière mise à jour: {{ page.meta.git_revision_date_localized }}
      </div>
    </div>
  {% endif %}
{% endblock %}
